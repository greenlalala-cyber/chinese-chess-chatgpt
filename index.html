<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>冠冠象棋與暗棋</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <div id="modalOverlay" class="modalOverlay hidden" aria-hidden="true">
      <div id="modal" class="modal" role="dialog" aria-modal="true">
        <div class="modalHeader">
          <div id="modalTitle" class="modalTitle">提示</div>
        </div>
        <div id="modalBody" class="modalBody"></div>
        <div id="modalActions" class="modalActions"></div>
      </div>
    </div>

    <section id="menuScreen" class="screen">
      <header class="header">
        <h1>冠冠象棋與暗棋</h1>
        <p class="sub">離線單機版 HTML CSS JavaScript</p>
      </header>

      <div class="panel">
        <h2>遊戲模式</h2>
        <div class="row">
          <label><input type="radio" name="mode" value="pvcpu" checked> 玩家對電腦</label>
          <label><input type="radio" name="mode" value="pvp"> 雙人本機輪流</label>
        </div>
      </div>

      <div class="panel">
        <h2>棋盤模式</h2>
        <div class="row">
          <label><input type="radio" name="boardMode" value="big" checked> 大盤 中國象棋 9×10</label>
          <label><input type="radio" name="boardMode" value="dark"> 小盤 台灣暗棋 4×8 32 子</label>
        </div>
        <p class="hintText">
          大盤固定紅先。大盤雙人對打不在遊戲內選紅黑，請現實中自行分配。
        </p>
      </div>

      <div id="bigColorPanel" class="panel">
        <h2>大盤 玩家棋色</h2>
        <div class="row">
          <label><input type="radio" name="bigPlayerColor" value="r" checked> 玩家當紅</label>
          <label><input type="radio" name="bigPlayerColor" value="b"> 玩家當黑</label>
        </div>
        <p class="hintText">大盤永遠紅先。玩家當黑時電腦先走。</p>
      </div>

      <div id="darkOptionsPanel" class="panel hidden">
        <h2>暗棋選項</h2>
        <div class="row">
          <label><input type="checkbox" id="optFogCapture" checked> 暗吃</label>
          <label><input type="checkbox" id="optChainCapture" checked> 連吃</label>
        </div>
      </div>

      <div id="cpuPanel" class="panel">
        <h2>電腦等級</h2>
        <div class="row">
          <select id="cpuLevel">
            <option value="normal">一般</option>
            <option value="medium">稍強</option>
            <option value="strong">強勁</option>
            <option value="ultra">超強</option>
          </select>
          <span class="hintText">難度越高越強。骰子更容易出 6 只影響暗棋的骰子流程。</span>
        </div>
      </div>

      <div id="dicePanel" class="panel hidden">
        <h2>暗棋 先手決定</h2>
        <div class="col">
          <label><input type="radio" name="firstMethod" value="manual" checked> 直接指定先行動方</label>
          <label><input type="radio" name="firstMethod" value="diceAuto"> 骰子隨機決定</label>
          <label><input type="radio" name="firstMethod" value="diceStop"> 骰子隨機決定 玩家可按停</label>
        </div>

        <div id="manualFirstRow" class="row">
          <span>先行動方</span>
          <label><input type="radio" name="manualFirst" value="r" checked> 玩家1</label>
          <label><input type="radio" name="manualFirst" value="b"> 玩家2</label>
        </div>

        <p class="hintText">暗棋的紅黑由第一顆翻出的棋決定。這裡只決定誰先行動。</p>
      </div>

      <div class="panel">
        <h2>提示與音效</h2>
        <div class="row">
          <label><input type="checkbox" id="optMoveHints" checked> 棋步提示</label>
          <label><input type="checkbox" id="optDangerHints"> 危險區域提示</label>
        </div>
        <div class="row">
          <label><input type="checkbox" id="optSound" checked> 音效</label>
          <span class="hintText">瀏覽器需先有一次點擊或觸控後才能播放</span>
        </div>
      </div>

      <div class="panel actions">
        <button id="btnStart" class="primary">開始遊戲</button>
        <button id="btnClearSave" class="ghost">清除本機存檔</button>
      </div>

      <footer class="footer">
        <p class="small">本遊戲會使用 localStorage 保存進度。清除瀏覽器資料會使存檔消失。</p>
      </footer>
    </section>

    <section id="gameScreen" class="screen hidden">
      <header class="gameTop">
        <div class="left">
          <div id="statusLine" class="statusLine">狀態</div>
          <div id="subStatusLine" class="subStatusLine"></div>
        </div>

        <div class="right">
          <button id="btnCheckWin" class="checkWin hidden">將軍</button>
          <button id="btnStopChain" class="primary hidden">結束連吃</button>
          <button id="btnUndo" class="ghost">悔棋</button>
          <button id="btnRestart" class="ghost">重新開始</button>
          <button id="btnToMenu" class="ghost">回主選單</button>
        </div>
      </header>

      <main class="gameMain">
        <div class="boardWrap">
          <div id="board" class="board vintage" aria-label="棋盤"></div>
        </div>

        <aside class="sidePanel">
          <div class="panel">
            <h3>遊戲內設定</h3>

            <div class="row">
              <label class="toggle"><input type="checkbox" id="inSound"> 音效</label>
            </div>
            <div class="row">
              <label class="toggle"><input type="checkbox" id="inMoveHints"> 棋步提示</label>
            </div>
            <div class="row">
              <label class="toggle"><input type="checkbox" id="inDangerHints"> 危險區域提示</label>
            </div>

            <hr/>

            <div id="darkToggles" class="hidden">
              <div class="row">
                <label class="toggle"><input type="checkbox" id="inFogCapture"> 暗吃</label>
              </div>
              <div class="row">
                <label class="toggle"><input type="checkbox" id="inChainCapture"> 連吃</label>
              </div>
              <div class="small" style="margin-top:8px;">
                連吃中可繼續吃或按結束連吃
              </div>
            </div>
          </div>

          <div class="panel">
            <h3>棋步紀錄</h3>
            <div id="history" class="history"></div>
          </div>
        </aside>
      </main>
    </section>

  </div>

  <script src="main.js"></script>
</body>
</html>
